<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background -->
  <rect width="256" height="256" rx="40" fill="#0f1117"/>

  <!-- Graph edges -->
  <line x1="128" y1="72" x2="80" y2="128" stroke="#1e40af" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="128" y1="72" x2="176" y2="128" stroke="#1e40af" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="80" y1="128" x2="64" y2="184" stroke="#1e40af" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="176" y1="128" x2="192" y2="184" stroke="#1e40af" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="80" y1="128" x2="128" y2="184" stroke="#1e40af" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="176" y1="128" x2="128" y2="184" stroke="#1e40af" stroke-width="2" stroke-linecap="round" opacity="0.4"/>

  <!-- Outer satellite nodes -->
  <circle cx="64" cy="184" r="10" fill="#1d4ed8" opacity="0.8"/>
  <circle cx="192" cy="184" r="10" fill="#1d4ed8" opacity="0.8"/>
  <circle cx="128" cy="184" r="12" fill="#2563eb" opacity="0.9"/>

  <!-- Mid-level nodes -->
  <circle cx="80" cy="128" r="14" fill="#3b82f6" opacity="0.9"/>
  <circle cx="176" cy="128" r="14" fill="#3b82f6" opacity="0.9"/>

  <!-- Hub node with glow -->
  <circle cx="128" cy="72" r="5" fill="#38bdf8" opacity="0.4" transform="scale(5) translate(-102.4,-57.6)"/>
  <circle cx="128" cy="72" r="22" fill="#0ea5e9" opacity="0.15"/>
  <circle cx="128" cy="72" r="18" fill="#0ea5e9" opacity="0.3"/>
  <circle cx="128" cy="72" r="13" fill="#38bdf8"/>

  <!-- Cockpit tick marks (dashboard feel) -->
  <circle cx="128" cy="128" r="58" fill="none" stroke="#1e3a5f" stroke-width="1" stroke-dasharray="4 8" opacity="0.4"/>
</svg>

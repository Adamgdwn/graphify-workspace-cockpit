services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./workspace/state:/app/workspace/state
    environment:
      GRAPH_PATH: ${GRAPH_PATH:-}
      STATE_DIR: workspace/state
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      RECOMMEND_MODEL_DEFAULT: ${RECOMMEND_MODEL_DEFAULT:-local-balanced:latest}
      SEMANTIC_MODEL_DEFAULT: ${SEMANTIC_MODEL_DEFAULT:-nomic-embed-text:latest}
      GRAPH_ESCALATION_ENABLED: ${GRAPH_ESCALATION_ENABLED:-false}
      GRAPH_ESCALATION_BACKEND: ${GRAPH_ESCALATION_BACKEND:-}
      GRAPH_ESCALATION_MODEL: ${GRAPH_ESCALATION_MODEL:-}
      GRAPH_ESCALATION_FILE_THRESHOLD: ${GRAPH_ESCALATION_FILE_THRESHOLD:-1500}
      GRAPH_ESCALATION_ROOT_THRESHOLD: ${GRAPH_ESCALATION_ROOT_THRESHOLD:-2}
      GRAPH_ESCALATION_DECIDER_MODEL: ${GRAPH_ESCALATION_DECIDER_MODEL:-local-balanced:latest}
      GRAPH_ESCALATION_TIMEOUT: ${GRAPH_ESCALATION_TIMEOUT:-1800}
      GRAPH_ESCALATION_API_TIMEOUT: ${GRAPH_ESCALATION_API_TIMEOUT:-600}
      GRAPH_ESCALATION_MAX_CONCURRENCY: ${GRAPH_ESCALATION_MAX_CONCURRENCY:-2}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      API_KEY: ${API_KEY:-}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-file}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_KEY: ${SUPABASE_KEY:-}

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "5173:80"
    depends_on:
      - backend

  # CNS API — Graphify Phase 2 query service for GAIL OS and Freedom.
  # CNS_STORE_PATH must point to the SQLite store on a shared volume.
  # Start: docker compose up cns-api
  cns-api:
    build:
      context: .
      dockerfile: Dockerfile.cns-api
    ports:
      - "8001:8001"
    volumes:
      - cns_store:/data
    environment:
      CNS_STORE_PATH: /data/cns.db
      CNS_API_PORT: 8001
      CNS_API_HOST: 0.0.0.0
      CNS_API_KEY: ${CNS_API_KEY:-}

  # Optional HTTPS via Caddy.  Start with: docker-compose --profile https up --build
  # Requires DOMAIN env var for Let's Encrypt; falls back to localhost (self-signed).
  # When using Caddy set VITE_API_URL=/api and rebuild the frontend image so the
  # browser sends API calls through Caddy rather than directly to port 8000.
  caddy:
    image: caddy:2-alpine
    profiles:
      - https
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    depends_on:
      - backend
      - frontend

volumes:
  caddy_data:
  caddy_config:
  cns_store:

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./workspace/state:/app/workspace/state
    environment:
      GRAPH_PATH: ${GRAPH_PATH:-workspace/demo/graph.json}
      STATE_DIR: workspace/state
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      API_KEY: ${API_KEY:-}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-file}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_KEY: ${SUPABASE_KEY:-}

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "5173:80"
    depends_on:
      - backend

  # Optional HTTPS via Caddy.  Start with: docker-compose --profile https up --build
  # Requires DOMAIN env var for Let's Encrypt; falls back to localhost (self-signed).
  # When using Caddy set VITE_API_URL=/api and rebuild the frontend image so the
  # browser sends API calls through Caddy rather than directly to port 8000.
  caddy:
    image: caddy:2-alpine
    profiles:
      - https
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    depends_on:
      - backend
      - frontend

volumes:
  caddy_data:
  caddy_config:

name: Build and Push Graphify CNS API

on:
  push:
    branches: [ main ]
    paths:
      - 'cns_api/**'
      - 'cns_store/**'
      - 'Dockerfile.cns-api'
      - '.dockerignore'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: acrgailcnspilot.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.cns-api
          push: true
          tags: |
            acrgailcnspilot.azurecr.io/graphify-cns-api:latest
            acrgailcnspilot.azurecr.io/graphify-cns-api:${{ github.sha }}

      - name: Smoke test image
        run: |
          docker run --rm -d \
            --name graphify-cns-smoke \
            -e CNS_STORE_PATH=/tmp/cns.db \
            -e CNS_API_KEY=smoke-test-key \
            -p 8001:8001 \
            acrgailcnspilot.azurecr.io/graphify-cns-api:${{ github.sha }}
          sleep 5
          curl -f http://localhost:8001/health
          docker stop graphify-cns-smoke
